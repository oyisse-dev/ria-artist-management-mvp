AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: RIA Artist Management MVP (Cognito + API Gateway + Lambda + DynamoDB + S3)

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 15
    MemorySize: 512
    Architectures:
      - x86_64
    Environment:
      Variables:
        TABLE_NAME:
          Ref: RecordsTable
        BUCKET_NAME:
          Ref: DocumentsBucket
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"

Parameters:
  EnvironmentName:
    Type: String
    Default: dev

Resources:
  RecordsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: PyongRecords
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
        - AttributeName: GSI2PK
          AttributeType: S
        - AttributeName: GSI2SK
          AttributeType: S
        - AttributeName: GSI3PK
          AttributeType: S
        - AttributeName: GSI3SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI2
          KeySchema:
            - AttributeName: GSI2PK
              KeyType: HASH
            - AttributeName: GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: GSI3
          KeySchema:
            - AttributeName: GSI3PK
              KeyType: HASH
            - AttributeName: GSI3SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  DocumentsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName:
        Fn::Sub: ria-documents-${EnvironmentName}-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]
            AllowedHeaders: ["*"]
            MaxAge: 3000

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName:
        Fn::Sub: ria-user-pool-${EnvironmentName}
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireUppercase: true
          RequireNumbers: true
          RequireSymbols: false
      Schema:
        - Name: email
          Required: true
          Mutable: true
        - Name: name
          Required: false
          Mutable: true

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName:
        Fn::Sub: ria-web-client-${EnvironmentName}
      UserPoolId:
        Ref: UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      SupportedIdentityProviders:
        - COGNITO

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Admin
      UserPoolId:
        Ref: UserPool

  ManagerGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Manager
      UserPoolId:
        Ref: UserPool

  FinanceGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: Finance
      UserPoolId:
        Ref: UserPool

  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name:
        Fn::Sub: ria-api-${EnvironmentName}
      StageName: v1
      Cors:
        AllowMethods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn:
              Fn::GetAtt: [UserPool, Arn]

  ApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../backend/
      Handler: dist/index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName:
              Ref: RecordsTable
        - S3CrudPolicy:
            BucketName:
              Ref: DocumentsBucket
      Events:
        Root:
          Type: Api
          Properties:
            RestApiId:
              Ref: ApiGateway
            Path: /
            Method: ANY
        Proxy:
          Type: Api
          Properties:
            RestApiId:
              Ref: ApiGateway
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiBaseUrl:
    Description: API base URL
    Value:
      Fn::Sub: https://${ApiGateway}.execute-api.${AWS::Region}.amazonaws.com/v1

  UserPoolId:
    Description: Cognito user pool id
    Value:
      Ref: UserPool

  UserPoolClientId:
    Description: Cognito app client id
    Value:
      Ref: UserPoolClient

  Region:
    Description: AWS Region
    Value:
      Ref: AWS::Region

  RecordsTableName:
    Description: DynamoDB table name
    Value:
      Ref: RecordsTable

  DocumentsBucketName:
    Description: S3 bucket name
    Value:
      Ref: DocumentsBucket
